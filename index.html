        function renderItems(filter = 'All') {
            const feed = document.getElementById('itemFeed');
            feed.innerHTML = '';

            const filtered = filter === 'All' ? items : items.filter(i => i.brand === filter);

            filtered.forEach(item => {
                const profit = item.resell - item.price;
                feed.innerHTML += `
                    <div class="card-gradient rounded-3xl overflow-hidden shadow-2xl transition-all active:scale-95">
                        <div class="relative">
                            <img src="${item.img}" class="w-full h-56 object-cover opacity-80" alt="Produkt">
                            <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">
                                ${item.channel}
                            </div>
                            <div class="absolute bottom-4 right-4 profit-badge px-4 py-1 rounded-xl text-sm font-black">
                                + €${profit} PROFIT
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <span class="vinted-teal font-bold text-xs uppercase tracking-tighter">${item.brand}</span>
                                <span class="text-slate-500 text-xs">${item.time}</span>
                            </div>
                            <h3 class="text-lg font-bold leading-tight mb-4">${item.name}</h3>
                            <div class="flex justify-between items-end border-t border-slate-800 pt-4">
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">Vinted Preis</p>
                                    <p class="text-2xl font-black text-white">€${item.price}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">Est. Resell</p>
                                    <p class="text-xl font-bold text-amber-400">€${item.resell}</p>
                                </div>
                            </div>
                            <button class="w-full bg-vinted text-white font-bold py-3 rounded-xl mt-5 shadow-lg shadow-teal-500/20 uppercase text-sm tracking-widest">
                                Auf Vinted öffnen
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function filterBrand(brand) {
            // UI Update für Tabs
            document.querySelectorAll('.tab-link').forEach(btn => {
                btn.classList.remove('tab-active');
                if(btn.innerText.toLowerCase() === brand.toLowerCase() || (brand === 'All' && btn.innerText === 'Alle')) {
                    btn.classList.add('tab-active');
                }
            });
            renderItems(brand);
        }

        // Initialer Start
        renderItems();
    </script>
